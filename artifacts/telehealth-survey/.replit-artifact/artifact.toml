kind = "web"
previewPath = "/"
title = "Telehealth Readiness Survey"
version = "1.0.0"
id = "artifacts/telehealth-survey"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21409

[services.development]
run = "pnpm --filter @workspace/telehealth-survey run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/telehealth-survey", "run", "build" ]
serve = "static"
publicDir = "artifacts/telehealth-survey/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21409"
BASE_PATH = "/"
